%%writefile .github/workflows/ci_cd_pipeline.yml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model and generate model parameters
        run: python src/train_model.py

      - name: Check model parameter file
        run: test -f model/model_params.json

      - name: Run tests
        run: pytest tests/ -v

      - name: Check Streamlit dashboard syntax
        run: python -m py_compile dashboard/dashboard.py

